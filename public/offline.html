<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f3f4f7" />
    <meta name="color-scheme" content="light" />
    <title>Offline | TSS CRM</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background: #f3f4f7;
        color: #10172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 22rem;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
        padding: 1.5rem 1.25rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: -0.01em;
      }
      p {
        font-size: 0.9375rem;
        line-height: 1.5;
        color: #6b7280;
        margin: 0 0 1.25rem;
      }
      button {
        width: 100%;
        font: inherit;
        font-weight: 600;
        font-size: 0.9375rem;
        color: #fff;
        background: #2460fa;
        border: none;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        cursor: pointer;
      }
      button:active {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Check your connection, then try again. Leads, calendar, tasks, and notifications load from the network the same
        as in the browser once you are back online.
      </p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
